spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE}
  application:
    name: versebyverse

  web:
    resources:
      add-mappings: false # 404인 경우, static 리소스 참고하지 않고, 예외 핸들러에서 처리하도록 함.

  #vertex ai
  ai:
    vertex:
      ai:
        gemini:
          project-id: ${AI_PROJECT_ID}
          location: us-central1
          credentials-uri: classpath:${AI_KEY_PATH}
          chat:
            options:
              model: gemini-2.0-flash
              temperature: 0.000001
          transport: rest

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - email
              - profile
  cloud:
    aws:
      credentials:
        access-key: ${S3_ACCESS_KEY}
        secret-key: ${S3_SECRET_ACCESS_KEY}
      region:
        static: ${S3_REGION}
# S3 설정
aws:
  s3:
    bucket: ${S3_BUCKET_NAME}


server:
  port: 8080
  address: 0.0.0.0
  forward-headers-strategy: native
  servlet:
    session:
      cookie:
        secure: true
        http-only: true
        same-site: none

client:
  url: ${CLIENT_URL}