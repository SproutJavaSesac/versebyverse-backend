# HTTP 관련 에러
error.METHOD_NOT_ALLOWED=허용되지 않는 HTTP 메서드입니다.
error.UNSUPPORTED_MEDIA_TYPE=요청 Content-Type을 지원하지 않습니다.
error.NOT_ACCEPTABLE=응답 미디어 타입을 지원하지 않습니다.
# 요청 파라미터 관련 에러
error.MISSING_PATH_VARIABLE=경로 변수 값이 누락되었습니다.
error.MISSING_PARAMETER=필수 요청 파라미터가 누락되었습니다.
error.MISSING_REQUEST_PART=요청의 일부 데이터가 누락되었습니다.
error.REQUEST_BINDING_ERROR=요청 바인딩 과정에서 오류가 발생했습니다.
# 유효성 검사 관련 에러
error.VALIDATION_FAILED=입력값이 유효하지 않습니다.
error.METHOD_VALIDATION_FAILED=메서드 매개변수 유효성 검증에 실패했습니다.
error.INVALID_REQUEST_FORMAT=잘못된 요청 형식입니다. JSON 구문을 확인해주세요.
# 리소스 관련 에러
error.NOT_FOUND=요청하신 URL을 찾을 수 없습니다.
error.RESOURCE_NOT_FOUND=요청한 리소스를 찾을 수 없습니다.
# 파일 업로드 관련 에러
error.FILE_SIZE_EXCEEDED=업로드 가능한 파일 크기를 초과했습니다.
# 서버 에러
error.RESPONSE_ERROR=서버에서 요청을 처리하는 중 오류가 발생했습니다.
error.INTERNAL_SERVER_ERROR=알 수 없는 서버 오류가 발생했습니다.
error.INTERNAL_SERVER=알 수 없는 문제가 발생했습니다. 잠시 후 다시 시도해 주세요.