spring:
  datasource:
    driver-class-name: org.h2.Driver # H2 데이터베이스 드라이버
    url: jdbc:h2:mem:testdb;MODE=MySQL
    username: sa
    password:

  h2:
    console:
      enabled: true

  jpa:
    hibernate:
      ddl-auto: create-drop # DDL 자동 생성 설정, entity 클래스에 따라 테이블을 생성함.
    properties:
      hibernate:
        format_sql: true # 콘솔 창에서 SQL을 보기 좋게 출력함.(줄바꿈, 들여쓰기 등)
        show-sql: true # hibernate가 실행하는 SQL을 로그로 출력
  # 테스트에서는 data.sql 실행 안 함
  sql:
    init:
      mode: never

  #vertex ai
  ai:
    vertex:
      ai:
        gemini:
          project-id: ${AI_PROJECT_ID}
          location: us-central1
          credentials-uri: classpath:${AI_KEY_PATH}
          chat:
            options:
              model: gemini-2.0-flash
              temperature: 0.5
          transport: rest
  web:
    resources:
      add-mappings: false # 404인 경우, static 리소스 참고하지 않고, 예외 핸들러에서 처리하도록 함.

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope:
              - email
              - profile

              # log level 설정, 예: trace, debug, info, warn, error
logging:
  level:
    root: INFO
    org:
      springframework: info # slf4j 로그 레벨 설정
      hibernate.SQL: DEBUG # hibernate가 실행하는 SQL을 로그로 출력