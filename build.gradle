plugins {
	id 'java'
	id 'org.springframework.boot' version '3.5.0'
	id 'io.spring.dependency-management' version '1.1.7'
}

group = 'today.sesac'
version = '0.0.1-SNAPSHOT'

java {
	toolchain {
		languageVersion = JavaLanguageVersion.of(21)
	}
}

configurations {
	compileOnly {
		extendsFrom annotationProcessor
	}
}

repositories {
	mavenCentral()
//	// Spring Milestone 저장소 추가
//	maven { url 'https://repo.spring.io/milestone' }
//	// Spring Snapshot 저장소 추가
//	maven { url 'https://repo.spring.io/snapshot' }
}
// Spring AI BOM을 사용하여 의존성 버전 관리
dependencyManagement {
	imports {
		// 현재 Spring AI 1.0 GA 버전 (2025년 5월 23일 릴리즈)
		// https://spring.io/blog/2025/05/20/spring-ai-1-0-GA-released/
		// 만약 더 최신 버전이 있다면 해당 버전으로 변경
		mavenBom "org.springframework.ai:spring-ai-bom:1.0.0"
	}
}
dependencies {
	implementation 'org.springframework.boot:spring-boot-starter-data-jpa'
	implementation 'org.springframework.boot:spring-boot-starter-validation'
	implementation 'org.springframework.boot:spring-boot-starter-web'
	compileOnly 'org.projectlombok:lombok'
	runtimeOnly 'com.mysql:mysql-connector-j'
	annotationProcessor 'org.projectlombok:lombok'
	testImplementation 'org.springframework.boot:spring-boot-starter-test'
	testRuntimeOnly 'org.junit.platform:junit-platform-launcher'

	implementation 'org.springframework.ai:spring-ai-starter-model-vertex-ai-gemini'
}

tasks.named('test') {
    useJUnitPlatform()

    // gradle로 test를 실행할 때 .env 파일에 정의된 환경변수를 읽어와서 테스트 환경에 적용
    def envFile = file('.env')
    if (envFile.exists()) {
        envFile.eachLine { line ->
            if (line.trim() && !line.startsWith('#')) {
                def (key, value) = line.split('=', 2)
                if (key && value) {
                    // 환경 변수 설정
                    environment key, value.trim()
                }
            }
        }
    }
}

