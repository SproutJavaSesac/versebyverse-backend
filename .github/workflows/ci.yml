name: CI - Run Tests

on:
  push:
    branches: [ "develop", "204-deploy/ci-deploy" ]
  pull_request:
    branches: [ "main", "develop" ]
  workflow_dispatch: # 수동 실행

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: versebyverse_test
          MYSQL_USER: testuser
          MYSQL_PASSWORD: testuser12341
          TZ: UTC
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Setup MySQL charset
        run: |
          # MySQL이 준비될 때까지 대기
          for i in {1..30}; do
            if mysqladmin ping -h 127.0.0.1 -P 3306 -u testuser -ptestuser12341 --silent; then
              echo "MySQL is ready"
              # UTF8MB4 설정 확인 및 설정
              mysql -h 127.0.0.1 -P 3306 -u testuser -ptestuser12341 -e "
                ALTER DATABASE versebyverse_test CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
                SET NAMES utf8mb4;
              "
              break
            fi
            echo "Waiting for MySQL... ($i/30)"
            sleep 3
          done

      - name: Run tests
        run: ./gradlew test --info
        env:
          # Spring Profile
          SPRING_PROFILES_ACTIVE: test
          
          # Database settings (override for GitHub Actions MySQL service)
          DB_TEST_PORT: 3306  # GitHub Actions에서는 3306 포트 사용
          DB_TEST_NAME: versebyverse  # 로컬과 동일
          DB_TEST_USERNAME: user  # 로컬과 동일
          DB_TEST_PASSWORD: user1234  # 로컬과 동일
          
          # Real values from GitHub Secrets
          AI_PROJECT_ID: ${{ secrets.AI_PROJECT_ID }}
          AI_KEY_PATH: ${{ secrets.AI_KEY_PATH }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          KAKAO_CLIENT_ID: ${{ secrets.KAKAO_CLIENT_ID }}
          KAKAO_CLIENT_SECRET: ${{ secrets.KAKAO_CLIENT_SECRET }}
          S3_ACCESS_KEY: ${{ secrets.S3_ACCESS_KEY }}
          S3_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
          S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
          S3_REGION: ${{ secrets.S3_REGION }}
          CLIENT_URL: "http://localhost:3000"
          SERVER_URL: "http://localhost:8080"

      - name: Publish Test Report
        uses: dorny/test-reporter@v1
        if: success() || failure()
        with:
          name: Test Results
          path: build/test-results/test/*.xml
          reporter: java-junit

      - name: Generate test report
        if: always()
        run: ./gradlew jacocoTestReport

      - name: Upload coverage reports to Codecov
        if: always()
        uses: codecov/codecov-action@v4
        with:
          file: build/reports/jacoco/test/jacocoTestReport.xml
          fail_ci_if_error: false
