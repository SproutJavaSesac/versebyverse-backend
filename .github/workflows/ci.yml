name: CI (Test)

on:
  push:
    branches: [ "develop","204-deploy/ci-deploy" ]
  pull_request:
    branches: [ "main", "develop" ]
  workflow_dispatch: # 수동 실행

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: versebyverse_test
          MYSQL_USER: testuser
          MYSQL_PASSWORD: testuser12341
          TZ: UTC
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Prepare env for tests (map secrets -> test env)
        run: |
          # --- DB (application-test.yml이 기대하는 이름으로 세팅) ---
          echo "DB_TEST_PORT=3306" >> $GITHUB_ENV
          echo "DB_TEST_NAME=vbv_test" >> $GITHUB_ENV
          echo "DB_TEST_USERNAME=test" >> $GITHUB_ENV
          echo "DB_TEST_PASSWORD=test" >> $GITHUB_ENV

          # --- AI 키 파일: 시크릿 JSON을 파일로 만들고, 그 경로를 AI_KEY_PATH로 지정 ---
          mkdir -p src/test/resources
          echo "${{ secrets.AI_KEY_JSON }}" > src/test/resources/ai.json
          echo "AI_KEY_PATH=src/test/resources/ai.json" >> $GITHUB_ENV
          echo "AI_PROJECT_ID=${{ secrets.AI_PROJECT_ID }}" >> $GITHUB_ENV

          # --- 그 외 필요한 값들: 있으면 시크릿, 없으면 더미 ---
          echo "GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID || 'dummy' }}" >> $GITHUB_ENV
          echo "GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET || 'dummy' }}" >> $GITHUB_ENV
          echo "KAKAO_CLIENT_ID=${{ secrets.KAKAO_CLIENT_ID || 'dummy' }}" >> $GITHUB_ENV
          echo "KAKAO_CLIENT_SECRET=${{ secrets.KAKAO_CLIENT_SECRET || 'dummy' }}" >> $GITHUB_ENV
          echo "S3_ACCESS_KEY=${{ secrets.S3_ACCESS_KEY || 'dummy' }}" >> $GITHUB_ENV
          echo "S3_SECRET_ACCESS_KEY=${{ secrets.S3_SECRET_ACCESS_KEY || 'dummy' }}" >> $GITHUB_ENV
          echo "S3_BUCKET_NAME=${{ secrets.S3_BUCKET_NAME || 'dummy' }}" >> $GITHUB_ENV
          echo "S3_REGION=${{ secrets.S3_REGION || 'ap-northeast-2' }}" >> $GITHUB_ENV

      - name: Setup MySQL charset
        run: |
          # MySQL이 준비될 때까지 대기
          for i in {1..30}; do
            if mysqladmin ping -h 127.0.0.1 -P 3306 -u testuser -ptestuser12341 --silent; then
              echo "MySQL is ready"
              # UTF8MB4 설정 확인 및 설정
              mysql -h 127.0.0.1 -P 3306 -u testuser -ptestuser12341 -e "
                ALTER DATABASE versebyverse_test CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
                SET NAMES utf8mb4;
              "
              break
            fi
            echo "Waiting for MySQL... ($i/30)"
            sleep 3
          done

      - name: Run tests
        run: ./gradlew clean test -Dspring.profiles.active=test --info