name: CI (Test)

on:
  push:
    branches: [ "develop","204-deploy/ci-deploy" ]
  pull_request:
    branches: [ "main", "develop" ]
  workflow_dispatch: # 수동 실행

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: versebyverse_test
          MYSQL_USER: testuser
          MYSQL_PASSWORD: testuser12341
          TZ: UTC
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Prepare env for tests (map secrets -> test env)
        run: |
          echo "SPRING_PROFILES_ACTIVE=test" >> $GITHUB_ENV       # 프로필 강제
          mkdir -p src/test/resources
          echo "${{ secrets.AI_KEY_JSON }}" > src/test/resources/ai.json
          echo "AI_KEY_PATH=ai.json" >> $GITHUB_ENV               # 클래스패스용 이름만!
          echo "DB_TEST_PORT=3306" >> $GITHUB_ENV
          echo "DB_TEST_NAME=versebyverse_test" >> $GITHUB_ENV
          echo "DB_TEST_USERNAME=testuser " >> $GITHUB_ENV
          echo "DB_TEST_PASSWORD=testuser12341" >> $GITHUB_ENV
          echo "GOOGLE_CLIENT_ID=dummy" >> $GITHUB_ENV
          echo "GOOGLE_CLIENT_SECRET=dummy" >> $GITHUB_ENV
          echo "S3_ACCESS_KEY=dummy" >> $GITHUB_ENV
          echo "S3_SECRET_ACCESS_KEY=dummy" >> $GITHUB_ENV
          echo "S3_BUCKET_NAME=dummy" >> $GITHUB_ENV
          echo "S3_REGION=ap-northeast-2" >> $GITHUB_ENV


      - name: Setup MySQL charset
        run: |
          # MySQL이 준비될 때까지 대기
          for i in {1..30}; do
            if mysqladmin ping -h 127.0.0.1 -P 3306 -u testuser -ptestuser12341 --silent; then
              echo "MySQL is ready"
              # UTF8MB4 설정 확인 및 설정
              mysql -h 127.0.0.1 -P 3306 -u testuser -ptestuser12341 -e "
                ALTER DATABASE versebyverse_test CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
                SET NAMES utf8mb4;
              "
              break
            fi
            echo "Waiting for MySQL... ($i/30)"
            sleep 3
          done

      - name: Run tests
        run: ./gradlew clean test -Dspring.profiles.active=test --info