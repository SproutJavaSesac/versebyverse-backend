name: CI-CD to EC2 (ECR + Docker Compose)

on:
  push:
    branches: [ "develop", "204-deploy/ci-deploy" ]  # 배포 브랜치, 테스트를 위해 임시 브랜치 포함
  pull_request:
    branches: [ "main", "develop" ]
  workflow_dispatch: #테스트 위해 커밋/푸시 안해도 수동으로 실행

jobs:
  test:
    uses: ./.github/workflows/ci.yml  # 테스트 먼저 실행
  
  build-and-deploy:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # JDK 설정 (Gradle 빌드 캐시 활용)
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Build app
        #        env:
        #          DB_HOST: ${{ secrets.DB_HOST }}
        #          DB_PORT: ${{ secrets.DB_PORT }}
        #          DB_NAME: ${{ secrets.DB_NAME }}
        #          DB_USERNAME: ${{ secrets.DB_USERNAME }}
        #          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        #          AI_PROJECT_ID: ${{ secrets.AI_PROJECT_ID }}
        #          AI_KEY_PATH: ${{ secrets.AI_KEY_PATH }}
        #          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
        #          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
        #          KAKAO_CLIENT_ID: ${{ secrets.KAKAO_CLIENT_ID }}
        #          KAKAO_CLIENT_SECRET: ${{ secrets.KAKAO_CLIENT_SECRET }}
        #          S3_ACCESS_KEY: ${{ secrets.S3_ACCESS_KEY }}
        #          S3_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
        #          S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
        #          S3_REGION: ${{ secrets.S3_REGION }}
        #          CLIENT_URL: ${{ secrets.CLIENT_URL }}
        #          SERVER_URL: ${{ secrets.SERVER_URL }}
        #          SPRING_PROFILES_ACTIVE: test
        run:
          ./gradlew clean bootJar -x test
      # ECR 로그인
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & Push Docker image
        env:
          ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ secrets.DOCKER_IMAGE_TAG || 'latest' }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      # EC2에 접속해서 compose 재시작
      - name: SSH deploy (docker compose pull & up -d)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd ~/app
            docker login -u AWS -p $(aws ecr get-login-password --region ${{ secrets.AWS_REGION }}) ${{ secrets.ECR_REGISTRY }}
            docker compose pull
            docker compose up -d
            docker image prune -f
